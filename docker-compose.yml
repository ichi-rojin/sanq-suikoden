# 責務: 開発コンテナの起動定義（CR-4）。npm/nodeの実行は本コンテナ内のみ。
services:
  dev:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sleep infinity

volumes:
  node_modules:
